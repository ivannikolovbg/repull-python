name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        # NB: cache disabled — this repo has no uv.lock, and the
        # cache-dependency-glob default (**/uv.lock) errors on miss.
        with:
          enable-cache: false

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: uv pip install --system -e ".[dev]"

      - name: ruff check
        run: ruff check .

      - name: mypy
        run: mypy src

      - name: pytest
        run: pytest -q
        if: ${{ hashFiles('tests/**/*.py') != '' }}

      - name: Import smoke test
        run: python -c "from repull import AuthenticatedClient, Client; print('repull import ok')"
